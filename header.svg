<svg width="100%" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');

      .root { font-family: 'Fira Code', 'Courier New', monospace; }

      /* flicker on ascii */
      @keyframes flicker {
        0%,93%,100% { opacity:1; }
        94%          { opacity:.7; }
        95%          { opacity:1; }
        97%          { opacity:.85; }
      }
      .ascii { animation: flicker 6s ease-in-out infinite; }

      /* staggered row fade-in */
      @keyframes fadeRow {
        from { opacity:0; transform:translateX(-10px); }
        to   { opacity:1; transform:translateX(0);     }
      }
      .r1  { animation: fadeRow .4s .05s ease both; }
      .r2  { animation: fadeRow .4s .18s ease both; }
      .r3  { animation: fadeRow .4s .32s ease both; }
      .r4  { animation: fadeRow .4s .46s ease both; }
      .r5  { animation: fadeRow .4s .60s ease both; }
      .r6  { animation: fadeRow .4s .74s ease both; }
      .r6b { animation: fadeRow .4s .82s ease both; }
      .r7  { animation: fadeRow .4s .90s ease both; }
      .r8  { animation: fadeRow .4s 1.04s ease both; }

      /* swatch pop */
      @keyframes swatchPop {
        from { opacity:0; transform:scale(0); }
        to   { opacity:1; transform:scale(1); }
      }
      .sw1 { animation: swatchPop .2s 1.2s ease both; }
      .sw2 { animation: swatchPop .2s 1.28s ease both; }
      .sw3 { animation: swatchPop .2s 1.36s ease both; }
      .sw4 { animation: swatchPop .2s 1.44s ease both; }
      .sw5 { animation: swatchPop .2s 1.52s ease both; }
      .sw6 { animation: swatchPop .2s 1.60s ease both; }
      .sw7 { animation: swatchPop .2s 1.68s ease both; }
      .sw8 { animation: swatchPop .2s 1.76s ease both; }

      /* typing cursor blink */
      @keyframes blink {
        0%,100% { opacity:1; }
        50%      { opacity:0; }
      }
      .cursor { animation: blink 1s step-end infinite; }

      /* typing text вҖ” cycles through 4 phrases using clip-path */
      @keyframes type1 {
        0%       { width:0; }
        12%      { width:26ch; }
        24%      { width:26ch; }
        28%      { width:0; }
        100%     { width:0; }
      }
      @keyframes type2 {
        0%,26%   { width:0; }
        38%      { width:30ch; }
        50%      { width:30ch; }
        54%      { width:0; }
        100%     { width:0; }
      }
      @keyframes type3 {
        0%,52%   { width:0; }
        64%      { width:28ch; }
        76%      { width:28ch; }
        80%      { width:0; }
        100%     { width:0; }
      }
      @keyframes type4 {
        0%,78%   { width:0; }
        90%      { width:32ch; }
        97%      { width:32ch; }
        100%     { width:0; }
      }

      .t1,.t2,.t3,.t4 {
        overflow: hidden;
        white-space: nowrap;
        display: inline-block;
      }
      .t1 { animation: type1 16s 1s ease-in-out infinite; }
      .t2 { animation: type2 16s 1s ease-in-out infinite; }
      .t3 { animation: type3 16s 1s ease-in-out infinite; }
      .t4 { animation: type4 16s 1s ease-in-out infinite; }

      /* stat card fade up */
      @keyframes fadeUp {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      .sc1 { animation: fadeUp .35s 1.4s ease both; }
      .sc2 { animation: fadeUp .35s 1.55s ease both; }
      .sc3 { animation: fadeUp .35s 1.70s ease both; }
      .sc4 { animation: fadeUp .35s 1.85s ease both; }
    </style>
  </defs>

  <!-- background -->
  <rect width="860" height="280" fill="#0d1117"/>

  <!-- в”Җв”Җ LEFT PANEL (ascii) в”Җв”Җ -->
  <rect x="0" y="0" width="400" height="280" fill="#010409"/>
  <rect x="400" y="0" width="1" height="280" fill="#21262d"/>

